<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼국시대 핵심 키워드 빈출표</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f9f6ef;
    --paper2: #f1ece0;
    --paper3: #e8e0ce;
    --ink: #1c160c;
    --ink2: #3a3020;
    --ink3: #7c6e55;
    --ink4: #b0a080;
    --red: #9b2828;
    --red2: #c94040;
    --amber: #b87820;
    --amber2: #d4a030;
    --teal: #1a6060;
    --teal2: #2a8070;
    --sage: #3a6040;
    --navy: #1c2c50;
    --navy2: #2a4070;
    --border: #d0c4aa;
    --border2: #e4dac8;
    --shadow: rgba(28, 22, 12, 0.10);
    --shadow2: rgba(28, 22, 12, 0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(184,120,32,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 85% 90%, rgba(26,96,96,0.05) 0%, transparent 60%);
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--ink);
    min-height: 100vh;
    padding: 48px 20px 72px;
  }

  /* ── HEADER ── */
  .page-header {
    max-width: 1120px;
    margin: 0 auto 36px;
    position: relative;
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 2px solid var(--border);
  }

  .header-left {}

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .eyebrow-dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
  }

  .eyebrow-text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--red);
  }

  h1 {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 30px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1.25;
    letter-spacing: -0.3px;
  }

  h1 em {
    font-style: normal;
    color: var(--red);
    border-bottom: 2.5px solid var(--amber2);
  }

  .header-sub {
    margin-top: 7px;
    font-size: 12.5px;
    color: var(--ink3);
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  /* Stats chips */
  .header-right {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    padding-bottom: 4px;
  }

  .chip {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 16px;
    text-align: center;
    box-shadow: 0 2px 6px var(--shadow2);
  }

  .chip-num {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--red);
    display: block;
    line-height: 1;
  }

  .chip-label {
    font-size: 10.5px;
    color: var(--ink3);
    margin-top: 3px;
    white-space: nowrap;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 14px;
    align-items: center;
  }

  .legend-title {
    font-size: 11px;
    color: var(--ink4);
    font-weight: 500;
    margin-right: 2px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--ink3);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── TABLE CARD ── */
  .card {
    max-width: 1120px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 1px 3px var(--shadow2),
      0 8px 32px var(--shadow);
  }

  .card-top-stripe {
    height: 4px;
    background: linear-gradient(90deg,
      var(--red) 0%, var(--red2) 20%,
      var(--amber) 40%, var(--amber2) 55%,
      var(--teal) 75%, var(--teal2) 100%);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  /* Head */
  thead tr {
    background: linear-gradient(180deg, #22180a 0%, #1a1208 100%);
  }

  thead th {
    padding: 13px 14px;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #d8cbb0;
    letter-spacing: 0.8px;
    text-align: left;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  thead th:last-child { border-right: none; }
  thead th.tc { text-align: center; }

  /* Body */
  tbody tr {
    border-bottom: 1px solid var(--border2);
    transition: background 0.12s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--paper2); }
  tbody tr:hover { background: #ede4d0; }

  td {
    padding: 11px 14px;
    font-size: 13px;
    vertical-align: middle;
    border-right: 1px solid var(--border2);
  }

  td:last-child { border-right: none; }

  /* ── RANK ── */
  .col-rank {
    width: 52px;
    min-width: 52px;
    text-align: center;
  }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    font-size: 11.5px;
    font-weight: 700;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
  }

  .rank-1  { background: #f5e6a8; color: #7a5800; border: 1.5px solid #c8a030; }
  .rank-2  { background: #e8e8e8; color: #505050; border: 1.5px solid #a8a8a8; }
  .rank-3  { background: #f5d8b8; color: #7a3a08; border: 1.5px solid #c07840; }
  .rank-default { background: transparent; color: var(--ink3); border: 1px solid var(--border); font-size: 11px; }

  /* ── CHOICE ── */
  .col-choice {
    min-width: 280px;
    max-width: 380px;
    line-height: 1.65;
    color: var(--ink2);
    font-size: 12.5px;
  }

  .choice-main { display: block; }

  .choice-sub {
    display: block;
    font-size: 11.5px;
    color: var(--ink3);
    margin-top: 2px;
  }

  .choice-desc {
    display: block;
    font-size: 11.5px;
    color: var(--ink3);
    line-height: 1.6;
    margin-top: 6px;
    padding: 5px 8px;
    background: var(--paper2);
    border-left: 2.5px solid var(--border);
    border-radius: 0 4px 4px 0;
  }

  /* ── KEYWORD TAG ── */
  .col-kw {
    width: 120px;
    min-width: 100px;
  }

  .kw-tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  /* ── ANSWER TAG ── */
  .col-ans {
    width: 150px;
    min-width: 130px;
  }

  .ans-tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11.5px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* Answer color coding by category */
  .ans-goguryeo  { background: #e0f0e8; color: #1a5030; border: 1px solid #90c8a8; }
  .ans-baekje    { background: #fce8d4; color: #8b3010; border: 1px solid #e8b090; }
  .ans-silla     { background: #eae0f8; color: #40206a; border: 1px solid #c0a0e0; }
  .ans-gaya      { background: #d8f0f0; color: #0a5050; border: 1px solid #88c8c8; }
  .ans-balhae    { background: #d8e8f8; color: #1a3068; border: 1px solid #88b0d8; }
  .ans-unified   { background: #f8ecd4; color: #6a4008; border: 1px solid #d8b070; }
  .ans-person    { background: #f8e8f0; color: #682050; border: 1px solid #d8a8c0; }
  .ans-year      { background: #e8eef8; color: #203060; border: 1px solid #a0b4d8; }
  .ans-event     { background: #f4ecd8; color: #5a4010; border: 1px solid #c8b080; }
  .ans-other     { background: #eeeeee; color: #404040; border: 1px solid #cccccc; }

  /* ── BAR ── */
  .col-bar {
    min-width: 180px;
    width: 210px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .bar-num {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    min-width: 22px;
    text-align: right;
    color: var(--red);
  }

  .bar-track {
    flex: 1;
    height: 9px;
    background: var(--paper2);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .bar-fill {
    height: 100%;
    border-radius: 5px;
  }

  /* Bar tiers */
  .bt1 { background: linear-gradient(90deg, #9b2828, #c94040); }
  .bt2 { background: linear-gradient(90deg, #b86020, #d89040); }
  .bt3 { background: linear-gradient(90deg, #c0981a, #d8b840); }
  .bt4 { background: linear-gradient(90deg, #2a7a50, #48a870); }
  .bt5 { background: linear-gradient(90deg, #1a6080, #3090b0); }

  /* ── FOOTER ── */
  .footer {
    max-width: 1120px;
    margin: 22px auto 0;
    font-size: 11px;
    color: var(--ink4);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ── MOBILE CARD LIST ── */
  .mobile-list { display: none; }

  .m-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow2);
    margin-bottom: 12px;
  }

  .m-card-stripe { height: 4px; }

  .m-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px 8px;
  }

  .m-card-body {
    padding: 0 14px 14px;
  }

  .m-choice-main {
    display: block;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink2);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .m-choice-desc {
    display: block;
    font-size: 12px;
    color: var(--ink3);
    line-height: 1.65;
    padding: 7px 10px;
    background: var(--paper2);
    border-left: 2.5px solid var(--border);
    border-radius: 0 4px 4px 0;
    margin-bottom: 10px;
  }

  .m-card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .m-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .m-bar-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
  }

  .m-bar-num {
    font-size: 14px;
    font-weight: 700;
    color: var(--red);
    min-width: 28px;
    text-align: right;
  }

  .m-bar-track {
    width: 80px;
    height: 8px;
    background: var(--paper2);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .m-bar-fill { height: 100%; border-radius: 5px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    body { padding: 28px 14px 60px; font-size: 13px; }
    h1 { font-size: 22px; }
    .header-inner { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header-right { gap: 8px; }
    .chip { padding: 6px 12px; }
    .chip-num { font-size: 16px; }
    .legend { gap: 8px; margin-top: 12px; }
    .legend-item { font-size: 10.5px; }
    /* 테이블 숨기고 카드 리스트 표시 */
    .card { display: none; }
    .mobile-list { display: block; max-width: 1120px; margin: 0 auto; }
  }
</style>
</head>
<body>

<header class="page-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="eyebrow">
        <div class="eyebrow-dot"></div>
        <span class="eyebrow-text">한국사능력검정시험 대비 학습자료</span>
      </div>
      <h1>삼국시대 <em>핵심 키워드</em> 빈출 선택지</h1>
      <p class="header-sub">실제 기출 선택지 분석 · 핵심 키워드 빈도 기준 상위 50개 항목</p>
    </div>
    <div class="header-right">
      <div class="chip"><span class="chip-num">843</span><div class="chip-label">총 기출 선택지</div></div>
      <div class="chip"><span class="chip-num">50</span><div class="chip-label">핵심 키워드</div></div>
      <div class="chip"><span class="chip-num">19</span><div class="chip-label">최고 출제횟수</div></div>
    </div>
  </div>
  <div class="legend">
    <span class="legend-title">정답 구분 →</span>
    <div class="legend-item"><div class="legend-dot" style="background:#1a5030;border:1px solid #90c8a8"></div>고구려</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8b3010;border:1px solid #e8b090"></div>백제</div>

    <div class="legend-item"><div class="legend-dot" style="background:#203060;border:1px solid #a0b4d8"></div>연도</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5a4010;border:1px solid #c8b080"></div>사건</div>
  </div>
</header>

<div class="card">
  <div class="card-top-stripe"></div>
  <table>
    <thead>
      <tr>
        <th class="tc">순위</th>
        <th>대표 선택지</th>
        <th>핵심 키워드</th>
        <th>정답</th>
        <th>출제횟수</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="mobile-list" id="mobileList"></div>

<footer class="footer">
  <span>출처 : 한국사능력검정시험 기출문제 &nbsp;|&nbsp; 총 843개 선택지 · 핵심 키워드 분석</span>
  <span>빈도 기준 내림차순 정렬 (1위 = 최다 출제)</span>
</footer>

<script>
const MAX = 19;

/* ── DATA ── */
const rows = [
  { r:1,  cnt:19, kw:"안승",       ans:"문무왕",                    ansType:"person",
    c1:"안승을 보덕왕으로 봉하였다.", c2:"안승이 보덕국의 왕으로 책봉되었다.",

  { r:2,  cnt:14, kw:"녹읍",       ans:"통일신라",                  ansType:"unified",

  { r:3,  cnt:14, kw:"광평성",     ans:"궁예",                      ansType:"person",

    desc:"궁예는 후고구려를 세운 뒤 광평성을 비롯한 중앙 관제를 정비하고 국호를 마진, 태봉으로 바꾸었다." },
  { r:4,  cnt:14, kw:"솔빈부",     ans:"발해",                      ansType:"balhae",

  { r:5,  cnt:13, kw:"미륵사",     ans:"무왕",                      ansType:"person",

  { r:8,  cnt:13, kw:"청해진",     ans:"통일신라 (흥덕왕)",         ansType:"unified",

  { r:9,  cnt:13, kw:"황룡사",     ans:"신라 (선덕여왕)",           ansType:"silla",

    desc:"신라의 당항성(경기 화성)은 대당 교역의 핵심 거점 항구로 기능하였으며, 영암은 서남해안의 국제 무역항으로 번성하였다." },

/* keyword tag styles */
const kwStyle = {
  goguryeo: "background:#e0f0e8;color:#1a5030;border:1px solid #90c8a8",
  baekje:   "background:#fce8d4;color:#8b3010;border:1px solid #e8b090",
  silla:    "background:#eae0f8;color:#40206a;border:1px solid #c0a0e0",
  gaya:     "background:#d8f0f0;color:#0a5050;border:1px solid #88c8c8",
  balhae:   "background:#d8e8f8;color:#1a3068;border:1px solid #88b0d8",
  unified:  "background:#f8ecd4;color:#6a4008;border:1px solid #d8b070",
  person:   "background:#f8e8f0;color:#682050;border:1px solid #d8a8c0",
  year:     "background:#e8eef8;color:#203060;border:1px solid #a0b4d8",
  event:    "background:#f4ecd8;color:#5a4010;border:1px solid #c8b080",
  other:    "background:#eeeeee;color:#404040;border:1px solid #cccccc",
};

function barTier(cnt) {
  if (cnt >= 16) return 'bt1';
  if (cnt >= 12) return 'bt2';
  if (cnt >= 9)  return 'bt3';
  if (cnt >= 7)  return 'bt4';
  return 'bt5';
}

function rankClass(r) {
  if (r === 1) return 'rank-1';
  if (r === 2) return 'rank-2';
  if (r === 3) return 'rank-3';
  return 'rank-default';
}

const tbody = document.getElementById('tbody');
const mobileList = document.getElementById('mobileList');

const stripeColor = {
  bt1: 'linear-gradient(90deg,#9b2828,#c94040)',
  bt2: 'linear-gradient(90deg,#b86020,#d89040)',
  bt3: 'linear-gradient(90deg,#c0981a,#d8b840)',
  bt4: 'linear-gradient(90deg,#2a7a50,#48a870)',
  bt5: 'linear-gradient(90deg,#1a6080,#3090b0)',
};

rows.forEach(d => {
  const pct  = Math.round((d.cnt / MAX) * 100);
  const ks   = kwStyle[d.ansType] || kwStyle.other;
  const tier = barTier(d.cnt);

  /* 데스크톱 테이블 행 */
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-rank tc"><span class="rank-badge ${rankClass(d.r)}">${d.r}</span></td>
    <td class="col-choice">
      <span class="choice-main">${d.c1}</span>
      ${d.desc ? `<span class="choice-desc">${d.desc}</span>` : ''}
    </td>
    <td class="col-kw"><span class="kw-tag" style="${ks}">${d.kw}</span></td>
    <td class="col-ans"><span class="ans-tag ans-${d.ansType}">${d.ans}</span></td>
    <td class="col-bar">
      <div class="bar-row">
        <span class="bar-num">${d.cnt}</span>
        <div class="bar-track">
          <div class="bar-fill ${tier}" style="width:${pct}%"></div>
        </div>
      </div>
    </td>`;
  tbody.appendChild(tr);

  /* 모바일 카드 */
  const mc = document.createElement('div');
  mc.className = 'm-card';
  mc.innerHTML = `
    <div class="m-card-stripe" style="background:${stripeColor[tier]}"></div>
    <div class="m-card-head">
      <span class="rank-badge ${rankClass(d.r)}">${d.r}</span>
      <span class="kw-tag" style="${ks}">${d.kw}</span>
      <span class="ans-tag ans-${d.ansType}" style="margin-left:auto">${d.ans}</span>
    </div>
    <div class="m-card-body">
      <span class="m-choice-main">${d.c1}</span>
      ${d.desc ? `<span class="m-choice-desc">${d.desc}</span>` : ''}
      <div class="m-card-foot">
        <div class="m-tags"></div>
        <div class="m-bar-wrap">
          <span class="m-bar-num">${d.cnt}회</span>
          <div class="m-bar-track">
            <div class="m-bar-fill ${tier}" style="width:${pct}%"></div>
          </div>
        </div>
      </div>
    </div>`;
  mobileList.appendChild(mc);
});
</script>
</body>
</html>
