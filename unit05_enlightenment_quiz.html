<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개화기 핵심 키워드 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f9f6ef;
    --paper2: #f1ece0;
    --paper3: #e8e0ce;
    --ink: #1c160c;
    --ink2: #3a3020;
    --ink3: #7c6e55;
    --ink4: #b0a080;
    --red: #9b2828;
    --red2: #c94040;
    --amber: #b87820;
    --amber2: #d4a030;
    --teal: #1a6060;
    --teal2: #2a8070;
    --border: #d0c4aa;
    --border2: #e4dac8;
    --shadow: rgba(28, 22, 12, 0.10);
    --shadow2: rgba(28, 22, 12, 0.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    background-image: radial-gradient(ellipse at 15% 10%, rgba(184,120,32,0.06) 0%, transparent 60%), radial-gradient(ellipse at 85% 90%, rgba(26,96,96,0.05) 0%, transparent 60%);
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 13px; color: var(--ink); min-height: 100vh; padding: 48px 20px 72px;
  }
  .page-header { max-width: 1120px; margin: 0 auto 36px; }
  .header-inner { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; padding-bottom: 18px; border-bottom: 2px solid var(--border); }
  .eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .eyebrow-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; }
  .eyebrow-text { font-size: 11px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--red); }
  h1 { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 30px; font-weight: 800; color: var(--ink); line-height: 1.25; letter-spacing: -0.3px; }
  h1 em { font-style: normal; color: var(--red); border-bottom: 2.5px solid var(--amber2); }
  .header-sub { margin-top: 7px; font-size: 12.5px; color: var(--ink3); font-weight: 400; letter-spacing: 0.2px; }
  .header-right { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; padding-bottom: 4px; }
  .chip { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 7px 16px; text-align: center; box-shadow: 0 2px 6px var(--shadow2); }
  .chip-num { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 18px; font-weight: 700; color: var(--red); display: block; line-height: 1; }
  .chip-label { font-size: 10.5px; color: var(--ink3); margin-top: 3px; white-space: nowrap; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 14px; align-items: center; }
  .legend-title { font-size: 11px; color: var(--ink4); font-weight: 500; margin-right: 2px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink3); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .card { max-width: 1120px; margin: 0 auto; background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px var(--shadow2), 0 8px 32px var(--shadow); }
  .card-top-stripe { height: 4px; background: linear-gradient(90deg, var(--red) 0%, var(--red2) 20%, var(--amber) 40%, var(--amber2) 55%, var(--teal) 75%, var(--teal2) 100%); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: linear-gradient(180deg, #22180a 0%, #1a1208 100%); }
  thead th { padding: 13px 14px; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700; color: #d8cbb0; letter-spacing: 0.8px; text-align: left; white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.06); }
  thead th:last-child { border-right: none; }
  thead th.tc { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border2); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--paper2); }
  tbody tr:hover { background: #ede4d0; }
  td { padding: 11px 14px; font-size: 13px; vertical-align: middle; border-right: 1px solid var(--border2); }
  td:last-child { border-right: none; }
  .col-rank { width: 52px; min-width: 52px; text-align: center; }
  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; font-size: 11.5px; font-weight: 700; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; }
  .rank-1  { background: #f5e6a8; color: #7a5800; border: 1.5px solid #c8a030; }
  .rank-2  { background: #e8e8e8; color: #505050; border: 1.5px solid #a8a8a8; }
  .rank-3  { background: #f5d8b8; color: #7a3a08; border: 1.5px solid #c07840; }
  .rank-default { background: transparent; color: var(--ink3); border: 1px solid var(--border); font-size: 11px; }
  .col-choice { min-width: 280px; max-width: 400px; line-height: 1.65; color: var(--ink2); font-size: 12.5px; }
  .choice-main { display: block; }
  .choice-desc { display: block; font-size: 11.5px; color: var(--ink3); line-height: 1.6; margin-top: 6px; padding: 5px 8px; background: var(--paper2); border-left: 2.5px solid var(--border); border-radius: 0 4px 4px 0; }
  .col-kw { width: 145px; min-width: 125px; }
  .kw-tag { display: inline-block; padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: 600; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; white-space: nowrap; letter-spacing: 0.2px; }
  .col-ans { width: 175px; min-width: 155px; }
  .ans-tag { display: inline-block; padding: 3px 9px; border-radius: 4px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
  .ans-heungseon  { background: #f0e8d8; color: #5a3808; border: 1px solid #d0a850; }
  .ans-reform     { background: #e0f0e8; color: #1a5030; border: 1px solid #80c8a0; }
  .ans-incident   { background: #ffe0e0; color: #7a1818; border: 1px solid #d89090; }
  .ans-movement   { background: #e8e0f8; color: #3a1878; border: 1px solid #b098d8; }
  .ans-org        { background: #d8f0f8; color: #0a4060; border: 1px solid #70b8d8; }
  .ans-year       { background: #f8e8c8; color: #6a4008; border: 1px solid #d8b060; }
  .ans-media      { background: #e8f0d8; color: #284808; border: 1px solid #90b870; }
  .ans-person     { background: #f8e0f0; color: #601848; border: 1px solid #d090b8; }
  .ans-treaty     { background: #e8eef8; color: #203060; border: 1px solid #a0b4d8; }
  .ans-religion   { background: #f4ecd8; color: #5a4010; border: 1px solid #c8b080; }
  .ans-other      { background: #eeeeee; color: #404040; border: 1px solid #cccccc; }
  .col-bar { min-width: 180px; width: 210px; }
  .bar-row { display: flex; align-items: center; gap: 9px; }
  .bar-num { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; min-width: 22px; text-align: right; color: var(--red); }
  .bar-track { flex: 1; height: 9px; background: var(--paper2); border-radius: 5px; overflow: hidden; border: 1px solid var(--border); }
  .bar-fill { height: 100%; border-radius: 5px; }
  .bt1 { background: linear-gradient(90deg, #9b2828, #c94040); }
  .bt2 { background: linear-gradient(90deg, #b86020, #d89040); }
  .bt3 { background: linear-gradient(90deg, #c0981a, #d8b840); }
  .bt4 { background: linear-gradient(90deg, #2a7a50, #48a870); }
  .bt5 { background: linear-gradient(90deg, #1a6080, #3090b0); }
  .footer { max-width: 1120px; margin: 22px auto 0; font-size: 11px; color: var(--ink4); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

  /* ── MOBILE CARD LIST ── */
  .mobile-list { display: none; }

  .m-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow2);
    margin-bottom: 12px;
  }

  .m-card-stripe { height: 4px; }

  .m-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px 8px;
  }

  .m-card-body {
    padding: 0 14px 14px;
  }

  .m-choice-main {
    display: block;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink2);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .m-choice-desc {
    display: block;
    font-size: 12px;
    color: var(--ink3);
    line-height: 1.65;
    padding: 7px 10px;
    background: var(--paper2);
    border-left: 2.5px solid var(--border);
    border-radius: 0 4px 4px 0;
    margin-bottom: 10px;
  }

  .m-card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .m-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .m-bar-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
  }

  .m-bar-num {
    font-size: 14px;
    font-weight: 700;
    color: var(--red);
    min-width: 28px;
    text-align: right;
  }

  .m-bar-track {
    width: 80px;
    height: 8px;
    background: var(--paper2);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .m-bar-fill { height: 100%; border-radius: 5px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    body { padding: 28px 14px 60px; font-size: 13px; }
    h1 { font-size: 22px; }
    .header-inner { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header-right { gap: 8px; }
    .chip { padding: 6px 12px; }
    .chip-num { font-size: 16px; }
    .legend { gap: 8px; margin-top: 12px; }
    .legend-item { font-size: 10.5px; }
    /* 테이블 숨기고 카드 리스트 표시 */
    .card { display: none; }
    .mobile-list { display: block; max-width: 1120px; margin: 0 auto; }
  }

  .quiz-controls { max-width: 1120px; margin: 0 auto 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .btn-reveal-all { display: inline-flex; align-items: center; gap: 7px; padding: 8px 18px; border-radius: 8px; font-size: 12.5px; font-weight: 700; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; cursor: pointer; border: 1.5px solid var(--amber); background: linear-gradient(135deg, #fff8ec, #fef0d0); color: var(--amber); transition: background 0.15s, box-shadow 0.15s; box-shadow: 0 2px 6px var(--shadow2); }
  .btn-reveal-all:hover { background: linear-gradient(135deg, #fef0d0, #fde0a0); box-shadow: 0 3px 10px rgba(184,120,32,0.18); }
  .btn-hide-all { display: inline-flex; align-items: center; gap: 7px; padding: 8px 18px; border-radius: 8px; font-size: 12.5px; font-weight: 700; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; cursor: pointer; border: 1.5px solid var(--border); background: #fff; color: var(--ink3); transition: background 0.15s, box-shadow 0.15s; box-shadow: 0 2px 6px var(--shadow2); }
  .btn-hide-all:hover { background: var(--paper2); box-shadow: 0 3px 10px var(--shadow); }
  .quiz-hint { font-size: 11.5px; color: var(--ink4); margin-left: 4px; }
  .quiz-hint span { color: var(--red); font-weight: 600; }
  .ans-hidden { display: none; }
  .ans-wrap { display: inline-flex; align-items: center; }
  .m-ans-wrap { display: inline-flex; align-items: center; }
  .btn-reveal { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 5px; font-size: 11.5px; font-weight: 600; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; cursor: pointer; border: 1.5px dashed var(--border); background: var(--paper2); color: var(--ink4); transition: all 0.15s; white-space: nowrap; }
  .btn-reveal:hover { border-color: var(--amber); background: #fff8ec; color: var(--amber); }
  .btn-reveal .eye-icon { font-size: 13px; line-height: 1; }
</style>
</head>
<body>
<header class="page-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="eyebrow"><div class="eyebrow-dot"></div><span class="eyebrow-text">한국사능력검정시험 대비 — 퀴즈 모드</span></div>
      <h1>개화기 <em>핵심 키워드</em> 퀴즈</h1>
      <p class="header-sub">정답 열을 가린 상태로 시작합니다 · 버튼을 클릭하면 정답을 확인할 수 있습니다</p>
    </div>
    <div class="header-right">
      <div class="chip"><span class="chip-num">869</span><div class="chip-label">총 기출 선택지</div></div>
      <div class="chip"><span class="chip-num">50</span><div class="chip-label">핵심 키워드</div></div>
      <div class="chip"><span class="chip-num">17</span><div class="chip-label">최고 출제횟수</div></div>
    </div>
  </div>
  <div class="legend">
    <span class="legend-title">정답 구분 →</span>
    <div class="legend-item"><div class="legend-dot" style="background:#5a3808;border:1px solid #d0a850"></div>흥선대원군</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a5030;border:1px solid #80c8a0"></div>개혁</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7a1818;border:1px solid #d89090"></div>사건·전쟁</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3a1878;border:1px solid #b098d8"></div>단체·운동</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0a4060;border:1px solid #70b8d8"></div>기관·제도</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6a4008;border:1px solid #d8b060"></div>연도</div>
    <div class="legend-item"><div class="legend-dot" style="background:#284808;border:1px solid #90b870"></div>언론·출판</div>
    <div class="legend-item"><div class="legend-dot" style="background:#601848;border:1px solid #d090b8"></div>인물</div>
    <div class="legend-item"><div class="legend-dot" style="background:#203060;border:1px solid #a0b4d8"></div>조약</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5a4010;border:1px solid #c8b080"></div>종교</div>
  </div>
</header>

<!-- 전체 공개/숨김 컨트롤 -->
<div class="quiz-controls">
  <button class="btn-reveal-all" onclick="revealAll()">
    <span class="eye-icon">👁</span> 정답 전체 보기
  </button>
  <button class="btn-hide-all" onclick="hideAll()">
    <span>🙈</span> 정답 전체 숨기기
  </button>
  <span class="quiz-hint">개별 버튼 클릭으로 <span>하나씩</span> 확인도 가능합니다</span>
</div>

<div class="card">
  <div class="card-top-stripe"></div>
  <table>
    <thead>
      <tr>
        <th class="tc">순위</th>
        <th>대표 선택지</th>
        <th>핵심 키워드</th>
        <th>정답</th>
        <th>출제횟수</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="mobile-list" id="mobileList"></div>

<footer class="footer">
  <span>출처 : 한국사능력검정시험 기출문제 &nbsp;|&nbsp; 총 869개 선택지 · 핵심 키워드 분석</span>
  <span>빈도 기준 내림차순 정렬 (1위 = 최다 출제)</span>
</footer>

<script>
const MAX = 17;

const rows = [
  { r:1,  cnt:17, kw:"구식 군인",         ans:"임오군란",             ansType:"incident",
    c1:"구식 군인에 대한 차별 대우가 발단이 되어 일어났다.",
    desc:"1882년 구식 군인들이 신식 군대 별기군과의 차별적 대우에 반발하여 봉기하였고, 청군의 개입으로 진압된 뒤 제물포 조약과 조청 상민 수륙 무역 장정이 체결되었다." },
  { r:2,  cnt:17, kw:"지계",              ans:"광무개혁",             ansType:"reform",
    c1:"지계아문을 설치하여 토지 소유자에게 지계를 발급하였다.",
    desc:"광무개혁에서 지계아문을 통해 양전 사업을 실시하고 근대적 토지 소유 증명서인 지계를 발급하여 토지 소유권을 확립하고자 하였다." },
  { r:3,  cnt:15, kw:"경복궁 중건",       ans:"흥선대원군",           ansType:"heungseon",
    c1:"경복궁 중건 비용을 마련하기 위해 원납전을 발행하였다.",
    desc:"흥선대원군은 왕실 권위 회복을 위해 경복궁을 중건하면서 원납전 강제 징수와 당백전 남발로 재원을 마련하였으나, 이로 인해 물가 폭등과 민심 이반이 심화되었다." },
  { r:4,  cnt:13, kw:"우정총국",          ans:"갑신정변",             ansType:"incident",
    c1:"우정총국 개국 축하연을 이용하여 일어났다.",
    desc:"1884년 김옥균·홍영식 등 급진 개화파가 우정총국 개국 축하연을 기회로 정변을 일으켜 개화당 정부를 수립하였으나, 청군의 개입으로 3일 만에 실패하였다." },
  { r:5,  cnt:12, kw:"홍범 14조",         ans:"2차 갑오개혁",         ansType:"reform",
    c1:"개혁의 방향을 제시한 홍범 14조를 반포하였다.",
    desc:"2차 갑오개혁의 기본 강령인 홍범 14조는 청과의 사대 관계 청산, 입헌 군주제 지향, 재정 일원화 등을 담고 있으며, 고종이 종묘에서 독립 서고문을 낭독하며 반포하였다." },
  { r:6,  cnt:11, kw:"황무지 개간권",     ans:"보안회",               ansType:"org",
    c1:"일제의 황무지 개간권 요구를 저지하였다.",
    desc:"1904년 일제의 황무지 개간권 요구에 맞서 보안회가 조직되어 전국적 반대 운동을 펼쳤으며, 이를 통해 일제의 요구를 철회시키는 성과를 거두었다." },
  { r:7,  cnt:11, kw:"집강소",            ans:"동학농민운동",          ansType:"movement",
    c1:"집강소를 중심으로 폐정 개혁안을 실천하였다.",
    desc:"전주 화약 이후 동학 농민군은 전라도 각 고을에 집강소를 설치하고 탐관오리 처벌·노비 문서 소각·토지 평균 분작 등 폐정 개혁을 자치적으로 실행하였다." },
  { r:8,  cnt:10, kw:"어재연",            ans:"신미양요",              ansType:"incident",
    c1:"광성보에서 어재연 부대가 미국 군대에 맞서 항전하였다.",
    desc:"1871년 신미양요 때 어재연 장군이 이끄는 수비대가 강화도 광성보에서 미군에 맞서 끝까지 항전하다 전사하였으며, 이 사건 이후 흥선대원군은 전국에 척화비를 건립하였다." },

    desc:"갑신정변 실패 후 조선과 일본은 한성 조약을 체결하여 일본 공사관 신축 비용과 피해 배상을 조선이 부담하게 되었으며, 청일 간에는 톈진 조약이 체결되었다." },

    desc:"1905년 경부선 철도가 개통되어 서울과 부산이 연결되었으며, 이는 러일 전쟁 중 일본의 군사·물자 수송을 목적으로 부설되어 일본의 대륙 침략을 용이하게 하였다." },
  { r:43, cnt:4,  kw:"23부 개편",         ans:"2차 갑오개혁",          ansType:"reform",
    c1:"지방 행정 구역을 8도에서 23부 337군으로 개편하였다.",
    desc:"2차 갑오개혁에서 지방 행정을 8도에서 23부 337군으로 개편하였으며, 교육 입국 조서 반포·재판소 설치 등 사법과 교육 제도의 근대화도 함께 추진하였다." },
  { r:44, cnt:4,  kw:"국채 보상 운동 지원", ans:"대한매일신보",        ansType:"media",
    c1:"국채 보상 운동의 확산에 기여하였다.",
    desc:"영국인 베델과 양기탁이 창간한 대한매일신보는 통감부의 검열을 피해 항일 논조를 유지하며 국채 보상 운동의 확산과 의병 투쟁 보도에 적극 기여하였다." },
  { r:45, cnt:4,  kw:"청군 개입",         ans:"임오군란",              ansType:"incident",
    c1:"청군의 개입으로 진압되었다.",
    desc:"임오군란은 청군의 개입으로 진압되었으며, 청은 흥선대원군을 납치하고 군사 고문을 파견하는 등 조선에 대한 내정 간섭을 강화하여 조청 상민 수륙 무역 장정을 체결하였다." },
  { r:46, cnt:3,  kw:"전주 화약",         ans:"동학농민운동",          ansType:"movement",
    c1:"전주 화약이 체결되어 농민군이 자진 해산하였다.",
    desc:"동학 농민군이 전주성을 점령하자 조선 정부가 청에 원군을 요청하였고, 농민군은 폐정 개혁 약속을 받은 뒤 전주 화약을 체결하고 자진 해산하였다." },
  { r:47, cnt:3,  kw:"호포제",            ans:"흥선대원군",            ansType:"heungseon",
    c1:"호포제를 시행하여 양반에게도 군포를 징수하였다.",
    desc:"흥선대원군은 종래 상민에게만 부과하던 군포를 양반에게도 징수하는 호포제를 시행하여 재정을 확충하고 양반 특권을 축소하였으며, 서원 철폐와 비변사 혁파도 단행하였다." },
  { r:48, cnt:3,  kw:"보빙사",            ans:"1883년",               ansType:"year",
    c1:"민영익을 대표로 한 보빙사가 미국에 파견되었다.",
    desc:"1883년 조미수호통상조약 체결 이후 민영익을 전권대신으로 한 보빙사가 미국에 파견되어 대통령을 예방하고 근대 문물을 시찰하였으며, 유길준은 이때 미국에 남아 유학하였다." },
  { r:49, cnt:3,  kw:"서재필",            ans:"독립신문",              ansType:"person",
    c1:"서재필이 창간한 우리나라 최초의 민간 신문이었다.",
    desc:"서재필은 1896년 우리나라 최초의 민간 신문인 독립신문을 창간하여 순한글과 영문판으로 발행하였으며, 같은 해 독립협회를 설립하여 자주 국권 운동을 이끌었다." },
  { r:50, cnt:3,  kw:"양기탁·베델",       ans:"대한매일신보",           ansType:"media",
    c1:"양기탁과 영국인 베델이 창간한 신문이었다.",
    desc:"대한매일신보는 1904년 양기탁과 영국인 베델(배설)이 창간하였으며, 베델의 외국인 신분 덕분에 일제의 검열을 피해 항일 논조의 기사를 게재하고 의병 활동을 호의적으로 보도하였다." },
];

const kwStyle = {
  heungseon: "background:#f0e8d8;color:#5a3808;border:1px solid #d0a850",
  reform:    "background:#e0f0e8;color:#1a5030;border:1px solid #80c8a0",
  incident:  "background:#ffe0e0;color:#7a1818;border:1px solid #d89090",
  movement:  "background:#e8e0f8;color:#3a1878;border:1px solid #b098d8",
  org:       "background:#d8f0f8;color:#0a4060;border:1px solid #70b8d8",
  year:      "background:#f8e8c8;color:#6a4008;border:1px solid #d8b060",
  media:     "background:#e8f0d8;color:#284808;border:1px solid #90b870",
  person:    "background:#f8e0f0;color:#601848;border:1px solid #d090b8",
  treaty:    "background:#e8eef8;color:#203060;border:1px solid #a0b4d8",
  religion:  "background:#f4ecd8;color:#5a4010;border:1px solid #c8b080",
  other:     "background:#eeeeee;color:#404040;border:1px solid #cccccc",
};

function barTier(cnt) {
  if (cnt >= 13) return 'bt1';
  if (cnt >= 9)  return 'bt2';
  if (cnt >= 6)  return 'bt3';
  if (cnt >= 4)  return 'bt4';
  return 'bt5';
}

function rankClass(r) {
  if (r === 1) return 'rank-1';
  if (r === 2) return 'rank-2';
  if (r === 3) return 'rank-3';
  return 'rank-default';
}

const tbody = document.getElementById('tbody');
const mobileList = document.getElementById('mobileList');

const stripeColor = {
  bt1: 'linear-gradient(90deg,#9b2828,#c94040)',
  bt2: 'linear-gradient(90deg,#b86020,#d89040)',
  bt3: 'linear-gradient(90deg,#c0981a,#d8b840)',
  bt4: 'linear-gradient(90deg,#2a7a50,#48a870)',
  bt5: 'linear-gradient(90deg,#1a6080,#3090b0)',
};

rows.forEach(d => {
  const pct  = Math.round((d.cnt / MAX) * 100);
  const ks   = kwStyle[d.ansType] || kwStyle.other;
  const tier = barTier(d.cnt);

  /* 데스크톱 테이블 행 */
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-rank tc"><span class="rank-badge ${rankClass(d.r)}">${d.r}</span></td>
    <td class="col-choice">
      <span class="choice-main">${d.c1}</span>
      ${d.desc ? `<span class="choice-desc">${d.desc}</span>` : ''}
    </td>
    <td class="col-kw"><span class="kw-tag" style="${ks}">${d.kw}</span></td>
    <td class="col-ans">
      <span class="ans-wrap">
        <span class="ans-tag ans-${d.ansType} ans-hidden">${d.ans}</span>
        <button class="btn-reveal" onclick="toggleAnswer(this)"><span class="eye-icon">👁</span> 정답 보기</button>
      </span>
    </td>
    <td class="col-bar">
      <div class="bar-row">
        <span class="bar-num">${d.cnt}</span>
        <div class="bar-track">
          <div class="bar-fill ${tier}" style="width:${pct}%"></div>
        </div>
      </div>
    </td>`;
  tbody.appendChild(tr);

  /* 모바일 카드 */
  const mc = document.createElement('div');
  mc.className = 'm-card';
  mc.innerHTML = `
    <div class="m-card-stripe" style="background:${stripeColor[tier]}"></div>
    <div class="m-card-head">
      <span class="rank-badge ${rankClass(d.r)}">${d.r}</span>
      <span class="kw-tag" style="${ks}">${d.kw}</span>
      <span class="m-ans-wrap" style="margin-left:auto">
        <span class="ans-tag ans-${d.ansType} ans-hidden">${d.ans}</span>
        <button class="btn-reveal" onclick="toggleAnswer(this)"><span class="eye-icon">👁</span> 정답 보기</button>
      </span>
    </div>
    <div class="m-card-body">
      <span class="m-choice-main">${d.c1}</span>
      ${d.desc ? `<span class="m-choice-desc">${d.desc}</span>` : ''}
      <div class="m-card-foot">
        <div class="m-tags"></div>
        <div class="m-bar-wrap">
          <span class="m-bar-num">${d.cnt}회</span>
          <div class="m-bar-track">
            <div class="m-bar-fill ${tier}" style="width:${pct}%"></div>
          </div>
        </div>
      </div>
    </div>`;
  mobileList.appendChild(mc);
});

function toggleAnswer(btn) {
  const wrap = btn.closest('.ans-wrap, .m-ans-wrap');
  const ansTag = wrap.querySelector('.ans-tag');
  if (ansTag.classList.contains('ans-hidden')) {
    ansTag.classList.remove('ans-hidden');
    btn.innerHTML = '<span class="eye-icon">🙈</span> 숨기기';
  } else {
    ansTag.classList.add('ans-hidden');
    btn.innerHTML = '<span class="eye-icon">👁</span> 정답 보기';
  }
}
function revealAll() {
  document.querySelectorAll('.ans-tag').forEach(el => el.classList.remove('ans-hidden'));
  document.querySelectorAll('.btn-reveal').forEach(btn => {
    btn.innerHTML = '<span class="eye-icon">🙈</span> 숨기기';
  });
}
function hideAll() {
  document.querySelectorAll('.ans-tag').forEach(el => el.classList.add('ans-hidden'));
  document.querySelectorAll('.btn-reveal').forEach(btn => {
    btn.innerHTML = '<span class="eye-icon">👁</span> 정답 보기';
  });
}
</script>
</body>
</html>
