<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고려시대 핵심 키워드 빈출표</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f9f6ef;
    --paper2: #f1ece0;
    --paper3: #e8e0ce;
    --ink: #1c160c;
    --ink2: #3a3020;
    --ink3: #7c6e55;
    --ink4: #b0a080;
    --red: #9b2828;
    --red2: #c94040;
    --amber: #b87820;
    --amber2: #d4a030;
    --teal: #1a6060;
    --teal2: #2a8070;
    --border: #d0c4aa;
    --border2: #e4dac8;
    --shadow: rgba(28, 22, 12, 0.10);
    --shadow2: rgba(28, 22, 12, 0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(184,120,32,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 85% 90%, rgba(26,96,96,0.05) 0%, transparent 60%);
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--ink);
    min-height: 100vh;
    padding: 48px 20px 72px;
  }

  .page-header {
    max-width: 1120px;
    margin: 0 auto 36px;
    position: relative;
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 2px solid var(--border);
  }

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .eyebrow-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; }

  .eyebrow-text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--red);
  }

  h1 {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 30px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1.25;
    letter-spacing: -0.3px;
  }

  h1 em { font-style: normal; color: var(--red); border-bottom: 2.5px solid var(--amber2); }

  .header-sub {
    margin-top: 7px;
    font-size: 12.5px;
    color: var(--ink3);
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .header-right {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    padding-bottom: 4px;
  }

  .chip {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 16px;
    text-align: center;
    box-shadow: 0 2px 6px var(--shadow2);
  }

  .chip-num {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--red);
    display: block;
    line-height: 1;
  }

  .chip-label { font-size: 10.5px; color: var(--ink3); margin-top: 3px; white-space: nowrap; }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 14px;
    align-items: center;
  }

  .legend-title { font-size: 11px; color: var(--ink4); font-weight: 500; margin-right: 2px; }

  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink3); }

  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── TABLE CARD ── */
  .card {
    max-width: 1120px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 3px var(--shadow2), 0 8px 32px var(--shadow);
  }

  .card-top-stripe {
    height: 4px;
    background: linear-gradient(90deg,
      var(--red) 0%, var(--red2) 20%,
      var(--amber) 40%, var(--amber2) 55%,
      var(--teal) 75%, var(--teal2) 100%);
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr { background: linear-gradient(180deg, #22180a 0%, #1a1208 100%); }

  thead th {
    padding: 13px 14px;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #d8cbb0;
    letter-spacing: 0.8px;
    text-align: left;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  thead th:last-child { border-right: none; }
  thead th.tc { text-align: center; }

  tbody tr { border-bottom: 1px solid var(--border2); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--paper2); }
  tbody tr:hover { background: #ede4d0; }

  td {
    padding: 11px 14px;
    font-size: 13px;
    vertical-align: middle;
    border-right: 1px solid var(--border2);
  }

  td:last-child { border-right: none; }

  /* ── RANK ── */
  .col-rank { width: 52px; min-width: 52px; text-align: center; }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    font-size: 11.5px;
    font-weight: 700;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
  }

  .rank-1  { background: #f5e6a8; color: #7a5800; border: 1.5px solid #c8a030; }
  .rank-2  { background: #e8e8e8; color: #505050; border: 1.5px solid #a8a8a8; }
  .rank-3  { background: #f5d8b8; color: #7a3a08; border: 1.5px solid #c07840; }
  .rank-default { background: transparent; color: var(--ink3); border: 1px solid var(--border); font-size: 11px; }

  /* ── CHOICE ── */
  .col-choice { min-width: 280px; max-width: 400px; line-height: 1.65; color: var(--ink2); font-size: 12.5px; }
  .choice-main { display: block; }

  .choice-desc {
    display: block;
    font-size: 11.5px;
    color: var(--ink3);
    line-height: 1.6;
    margin-top: 6px;
    padding: 5px 8px;
    background: var(--paper2);
    border-left: 2.5px solid var(--border);
    border-radius: 0 4px 4px 0;
  }

  /* ── KEYWORD TAG ── */
  .col-kw { width: 130px; min-width: 110px; }

  .kw-tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  /* ── ANSWER TAG ── */
  .col-ans { width: 150px; min-width: 130px; }

  .ans-tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11.5px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* 고려시대 정답 색상 */
  .ans-goryeo      { background: #f0e8d8; color: #5a3808; border: 1px solid #d0a860; }
  .ans-king        { background: #e8e0f8; color: #3a1870; border: 1px solid #b098d8; }
  .ans-monk        { background: #d8f0e8; color: #1a5038; border: 1px solid #80c0a0; }
  .ans-person      { background: #f8e8f0; color: #682050; border: 1px solid #d8a8c0; }
  .ans-military    { background: #ffe8e0; color: #7a2810; border: 1px solid #d89880; }
  .ans-mongol      { background: #e0e8f0; color: #1a2850; border: 1px solid #8098c0; }
  .ans-khitan      { background: #f0e8e0; color: #5a3020; border: 1px solid #c09870; }
  .ans-jurchen     { background: #e8f0e0; color: #284810; border: 1px solid #90b870; }
  .ans-interference{ background: #f8e0f0; color: #601848; border: 1px solid #d090b8; }
  .ans-event       { background: #f4ecd8; color: #5a4010; border: 1px solid #c8b080; }
  .ans-other       { background: #eeeeee; color: #404040; border: 1px solid #cccccc; }

  /* ── BAR ── */
  .col-bar { min-width: 180px; width: 210px; }

  .bar-row { display: flex; align-items: center; gap: 9px; }

  .bar-num {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    min-width: 22px;
    text-align: right;
    color: var(--red);
  }

  .bar-track {
    flex: 1;
    height: 9px;
    background: var(--paper2);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .bar-fill { height: 100%; border-radius: 5px; }

  .bt1 { background: linear-gradient(90deg, #9b2828, #c94040); }
  .bt2 { background: linear-gradient(90deg, #b86020, #d89040); }
  .bt3 { background: linear-gradient(90deg, #c0981a, #d8b840); }
  .bt4 { background: linear-gradient(90deg, #2a7a50, #48a870); }
  .bt5 { background: linear-gradient(90deg, #1a6080, #3090b0); }

  .footer {
    max-width: 1120px;
    margin: 22px auto 0;
    font-size: 11px;
    color: var(--ink4);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ── MOBILE CARD LIST ── */
  .mobile-list { display: none; }

  .m-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow2);
    margin-bottom: 12px;
  }

  .m-card-stripe { height: 4px; }

  .m-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px 8px;
  }

  .m-card-body {
    padding: 0 14px 14px;
  }

  .m-choice-main {
    display: block;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink2);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .m-choice-desc {
    display: block;
    font-size: 12px;
    color: var(--ink3);
    line-height: 1.65;
    padding: 7px 10px;
    background: var(--paper2);
    border-left: 2.5px solid var(--border);
    border-radius: 0 4px 4px 0;
    margin-bottom: 10px;
  }

  .m-card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .m-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .m-bar-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
  }

  .m-bar-num {
    font-size: 14px;
    font-weight: 700;
    color: var(--red);
    min-width: 28px;
    text-align: right;
  }

  .m-bar-track {
    width: 80px;
    height: 8px;
    background: var(--paper2);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .m-bar-fill { height: 100%; border-radius: 5px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    body { padding: 28px 14px 60px; font-size: 13px; }
    h1 { font-size: 22px; }
    .header-inner { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header-right { gap: 8px; }
    .chip { padding: 6px 12px; }
    .chip-num { font-size: 16px; }
    .legend { gap: 8px; margin-top: 12px; }
    .legend-item { font-size: 10.5px; }
    /* 테이블 숨기고 카드 리스트 표시 */
    .card { display: none; }
    .mobile-list { display: block; max-width: 1120px; margin: 0 auto; }
  }
</style>
</head>
<body>

<header class="page-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="eyebrow">
        <div class="eyebrow-dot"></div>
        <span class="eyebrow-text">한국사능력검정시험 대비 학습자료</span>
      </div>
      <h1>고려시대 <em>핵심 키워드</em> 빈출 선택지</h1>
      <p class="header-sub">실제 기출 선택지 분석 · 핵심 키워드 빈도 기준 상위 50개 항목</p>
    </div>
    <div class="header-right">
      <div class="chip"><span class="chip-num">838</span><div class="chip-label">총 기출 선택지</div></div>
      <div class="chip"><span class="chip-num">50</span><div class="chip-label">핵심 키워드</div></div>
      <div class="chip"><span class="chip-num">30</span><div class="chip-label">최고 출제횟수</div></div>
    </div>
  </div>
  <div class="legend">
    <span class="legend-title">정답 구분 →</span>
    <div class="legend-item"><div class="legend-dot" style="background:#5a3808;border:1px solid #d0a860"></div>고려 (국가)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3a1870;border:1px solid #b098d8"></div>왕</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a5038;border:1px solid #80c0a0"></div>승려</div>
    <div class="legend-item"><div class="legend-dot" style="background:#682050;border:1px solid #d8a8c0"></div>인물</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7a2810;border:1px solid #d89880"></div>무신·군사</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a2850;border:1px solid #8098c0"></div>몽골</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5a3020;border:1px solid #c09870"></div>거란</div>
    <div class="legend-item"><div class="legend-dot" style="background:#284810;border:1px solid #90b870"></div>여진</div>
    <div class="legend-item"><div class="legend-dot" style="background:#601848;border:1px solid #d090b8"></div>원 간섭기</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5a4010;border:1px solid #c8b080"></div>사건·기구</div>
  </div>
</header>

<div class="card">
  <div class="card-top-stripe"></div>
  <table>
    <thead>
      <tr>
        <th class="tc">순위</th>
        <th>대표 선택지</th>
        <th>핵심 키워드</th>
        <th>정답</th>
        <th>출제횟수</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="mobile-list" id="mobileList"></div>

<footer class="footer">
  <span>출처 : 한국사능력검정시험 기출문제 &nbsp;|&nbsp; 총 838개 선택지 · 핵심 키워드 분석</span>
  <span>빈도 기준 내림차순 정렬 (1위 = 최다 출제)</span>
</footer>

<script>
const MAX = 30;

const rows = [
  { r:1,  cnt:30, kw:"벽란도",       ans:"고려",       ansType:"goryeo",
    c1:"예성강 하구의 벽란도가 국제 무역항으로 번성하였다.",
    desc:"고려의 벽란도는 예성강 하구에 위치한 국제 무역항으로, 송·거란·여진은 물론 아라비아 상인까지 내왕하며 활발한 대외 교역이 이루어졌다." },
  { r:2,  cnt:27, kw:"귀주대첩",     ans:"거란",        ansType:"khitan",
    c1:"강감찬이 귀주에서 거란군을 크게 무찔렀다.",
    desc:"1019년 강감찬은 귀주(구주)에서 소배압이 이끄는 거란 10만 대군을 섬멸하는 귀주대첩을 이끌어 거란의 3차 침입을 격퇴하였다." },
  { r:3,  cnt:26, kw:"12목",         ans:"성종",        ansType:"king",
    c1:"전국에 12목을 설치하고 지방관을 파견하였다.",
    desc:"고려 성종은 최승로의 건의를 받아들여 전국 주요 거점 12곳에 목(牧)을 설치하고 처음으로 외관(지방관)을 파견하여 지방 통치를 강화하였다." },
  { r:4,  cnt:17, kw:"해동통보",     ans:"숙종",        ansType:"king",
    c1:"주전도감을 설치하여 해동통보를 발행하였다.",
    desc:"고려 숙종은 주전도감을 설치하고 해동통보·삼한통보 등의 화폐를 발행하여 상품 화폐 경제의 활성화를 도모하였다." },
  { r:5,  cnt:15, kw:"강화도",       ans:"몽골",        ansType:"mongol",
    c1:"강화도로 도읍을 옮겨 장기 항전을 준비하였다.",
    desc:"1232년 최우는 몽골의 침입에 맞서 강화도로 수도를 옮겨 40여 년간 항전하였으며, 이는 기병 중심인 몽골군의 약점을 이용한 전략이었다." },
  { r:6,  cnt:15, kw:"과거제",       ans:"광종",        ansType:"king",
    c1:"쌍기의 건의를 받아들여 과거제를 시행하였다.",
    desc:"고려 광종은 후주 출신 쌍기의 건의로 958년 과거제를 도입하여 능력 있는 인재를 등용하고 공신·호족 세력을 억제하며 왕권을 강화하였다." },
  { r:7,  cnt:15, kw:"전민변정도감", ans:"공민왕",      ansType:"king",
    c1:"신돈을 중심으로 전민변정 사업을 추진하였다.",
    desc:"공민왕은 신돈을 전민변정도감의 판사로 삼아 권문세족이 불법으로 빼앗은 토지와 노비를 원래 주인에게 돌려주는 개혁을 추진하였다." },
  { r:8,  cnt:14, kw:"준풍",         ans:"광종",        ansType:"king",
    c1:"광덕, 준풍 등의 독자적 연호를 사용하였다.",
    desc:"광종은 '광덕'·'준풍' 등 독자적인 연호를 사용하여 황제국 체제를 표방하였으며, 이는 고려가 대내적으로 황제국 의식을 가졌음을 보여 준다." },
  { r:9,  cnt:11, kw:"별무반",       ans:"여진",        ansType:"jurchen",
    c1:"신기군, 신보군, 항마군으로 편성되었다.",
    desc:"윤관은 여진 정벌의 실패 원인이 기병력 부족임을 깨닫고 숙종에게 건의하여 기병(신기군)·보병(신보군)·승병(항마군)으로 구성된 별무반을 창설하였다." },
  { r:10, cnt:11, kw:"만권당",       ans:"이제현",      ansType:"person",
    c1:"만권당에서 원의 학자들과 교유하였다.",
    desc:"이제현은 충선왕이 원의 대도(베이징)에 세운 만권당에서 조맹부·요수 등 원의 유명 학자들과 교류하며 성리학을 고려에 보급하는 데 기여하였다." },

    c1:"매를 기르고 훈련시키는 응방이 설치되었다.",
    desc:"원 간섭기에 몽골에 공납할 매를 사육·훈련하는 응방이 설치되었으며, 응방의 관원들이 백성의 토지·재산을 침탈하는 등 많은 폐단을 낳았다." },
  { r:49, cnt:1,  kw:"성상융회",   ans:"균여",           ansType:"monk",
    c1:"성상융회를 제창하여 교종 내 대립을 해소하였다.",
    desc:"균여는 성상융회(性相融會)를 제창하여 화엄종 내의 법성종·법상종 간 대립을 해소하고자 하였으며, 이는 고려 초 교종 통합의 선구적 시도였다." },
  { r:50, cnt:1,  kw:"양계",        ans:"고려",          ansType:"goryeo",
    c1:"국경 지역인 양계에 병마사를 파견하였다.",
    desc:"고려는 북방 국경 지역인 동계·북계(양계)에 병마사를 파견하여 군사적 방어를 담당하게 하였으며, 이는 내지의 5도 행정 체제와 구별되는 특수 행정 구역이었다." },
];

const kwStyle = {
  goryeo:       "background:#f0e8d8;color:#5a3808;border:1px solid #d0a860",
  king:         "background:#e8e0f8;color:#3a1870;border:1px solid #b098d8",
  monk:         "background:#d8f0e8;color:#1a5038;border:1px solid #80c0a0",
  person:       "background:#f8e8f0;color:#682050;border:1px solid #d8a8c0",
  military:     "background:#ffe8e0;color:#7a2810;border:1px solid #d89880",
  mongol:       "background:#e0e8f0;color:#1a2850;border:1px solid #8098c0",
  khitan:       "background:#f0e8e0;color:#5a3020;border:1px solid #c09870",
  jurchen:      "background:#e8f0e0;color:#284810;border:1px solid #90b870",
  interference: "background:#f8e0f0;color:#601848;border:1px solid #d090b8",
  event:        "background:#f4ecd8;color:#5a4010;border:1px solid #c8b080",
  other:        "background:#eeeeee;color:#404040;border:1px solid #cccccc",
};

function barTier(cnt) {
  if (cnt >= 20) return 'bt1';
  if (cnt >= 13) return 'bt2';
  if (cnt >= 8)  return 'bt3';
  if (cnt >= 4)  return 'bt4';
  return 'bt5';
}

function rankClass(r) {
  if (r === 1) return 'rank-1';
  if (r === 2) return 'rank-2';
  if (r === 3) return 'rank-3';
  return 'rank-default';
}

const tbody = document.getElementById('tbody');
const mobileList = document.getElementById('mobileList');

const stripeColor = {
  bt1: 'linear-gradient(90deg,#9b2828,#c94040)',
  bt2: 'linear-gradient(90deg,#b86020,#d89040)',
  bt3: 'linear-gradient(90deg,#c0981a,#d8b840)',
  bt4: 'linear-gradient(90deg,#2a7a50,#48a870)',
  bt5: 'linear-gradient(90deg,#1a6080,#3090b0)',
};

rows.forEach(d => {
  const pct  = Math.round((d.cnt / MAX) * 100);
  const ks   = kwStyle[d.ansType] || kwStyle.other;
  const tier = barTier(d.cnt);

  /* 데스크톱 테이블 행 */
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-rank tc"><span class="rank-badge ${rankClass(d.r)}">${d.r}</span></td>
    <td class="col-choice">
      <span class="choice-main">${d.c1}</span>
      ${d.desc ? `<span class="choice-desc">${d.desc}</span>` : ''}
    </td>
    <td class="col-kw"><span class="kw-tag" style="${ks}">${d.kw}</span></td>
    <td class="col-ans"><span class="ans-tag ans-${d.ansType}">${d.ans}</span></td>
    <td class="col-bar">
      <div class="bar-row">
        <span class="bar-num">${d.cnt}</span>
        <div class="bar-track">
          <div class="bar-fill ${tier}" style="width:${pct}%"></div>
        </div>
      </div>
    </td>`;
  tbody.appendChild(tr);

  /* 모바일 카드 */
  const mc = document.createElement('div');
  mc.className = 'm-card';
  mc.innerHTML = `
    <div class="m-card-stripe" style="background:${stripeColor[tier]}"></div>
    <div class="m-card-head">
      <span class="rank-badge ${rankClass(d.r)}">${d.r}</span>
      <span class="kw-tag" style="${ks}">${d.kw}</span>
      <span class="ans-tag ans-${d.ansType}" style="margin-left:auto">${d.ans}</span>
    </div>
    <div class="m-card-body">
      <span class="m-choice-main">${d.c1}</span>
      ${d.desc ? `<span class="m-choice-desc">${d.desc}</span>` : ''}
      <div class="m-card-foot">
        <div class="m-tags"></div>
        <div class="m-bar-wrap">
          <span class="m-bar-num">${d.cnt}회</span>
          <div class="m-bar-track">
            <div class="m-bar-fill ${tier}" style="width:${pct}%"></div>
          </div>
        </div>
      </div>
    </div>`;
  mobileList.appendChild(mc);
});
</script>
</body>
</html>
