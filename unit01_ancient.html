<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고대국가 핵심 키워드 빈출표 — 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f9f6ef;
    --paper2: #f1ece0;
    --paper3: #e8e0ce;
    --ink: #1c160c;
    --ink2: #3a3020;
    --ink3: #7c6e55;
    --ink4: #b0a080;
    --red: #9b2828;
    --red2: #c94040;
    --amber: #b87820;
    --amber2: #d4a030;
    --teal: #1a6060;
    --teal2: #2a8070;
    --sage: #3a6040;
    --navy: #1c2c50;
    --navy2: #2a4070;
    --border: #d0c4aa;
    --border2: #e4dac8;
    --shadow: rgba(28, 22, 12, 0.10);
    --shadow2: rgba(28, 22, 12, 0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(184,120,32,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 85% 90%, rgba(26,96,96,0.05) 0%, transparent 60%);
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--ink);
    min-height: 100vh;
    padding: 48px 20px 72px;
  }

  /* ── HEADER ── */
  .page-header {
    max-width: 1120px;
    margin: 0 auto 36px;
    position: relative;
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 2px solid var(--border);
  }

  .header-left {}

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .eyebrow-dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
  }

  .eyebrow-text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--red);
  }

  h1 {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 30px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1.25;
    letter-spacing: -0.3px;
  }

  h1 em {
    font-style: normal;
    color: var(--red);
    border-bottom: 2.5px solid var(--amber2);
  }

  .header-sub {
    margin-top: 7px;
    font-size: 12.5px;
    color: var(--ink3);
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .header-right {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    padding-bottom: 4px;
  }

  .chip {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 16px;
    text-align: center;
    box-shadow: 0 2px 6px var(--shadow2);
  }

  .chip-num {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--red);
    display: block;
    line-height: 1;
  }

  .chip-label {
    font-size: 10.5px;
    color: var(--ink3);
    margin-top: 3px;
    white-space: nowrap;
  }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 14px;
    align-items: center;
  }

  .legend-title {
    font-size: 11px;
    color: var(--ink4);
    font-weight: 500;
    margin-right: 2px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--ink3);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── QUIZ CONTROLS ── */
  .quiz-controls {
    max-width: 1120px;
    margin: 0 auto 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-reveal-all {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 12.5px;
    font-weight: 700;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: 1.5px solid var(--amber);
    background: linear-gradient(135deg, #fff8ec, #fef0d0);
    color: var(--amber);
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 6px var(--shadow2);
  }

  .btn-reveal-all:hover {
    background: linear-gradient(135deg, #fef0d0, #fde0a0);
    box-shadow: 0 3px 10px rgba(184,120,32,0.18);
  }

  .btn-hide-all {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 12.5px;
    font-weight: 700;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--ink3);
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 6px var(--shadow2);
  }

  .btn-hide-all:hover {
    background: var(--paper2);
    box-shadow: 0 3px 10px var(--shadow);
  }

  .quiz-hint {
    font-size: 11.5px;
    color: var(--ink4);
    margin-left: 4px;
  }

  .quiz-hint span {
    color: var(--red);
    font-weight: 600;
  }

  /* ── TABLE CARD ── */
  .card {
    max-width: 1120px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 1px 3px var(--shadow2),
      0 8px 32px var(--shadow);
  }

  .card-top-stripe {
    height: 4px;
    background: linear-gradient(90deg,
      var(--red) 0%, var(--red2) 20%,
      var(--amber) 40%, var(--amber2) 55%,
      var(--teal) 75%, var(--teal2) 100%);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: linear-gradient(180deg, #22180a 0%, #1a1208 100%);
  }

  thead th {
    padding: 13px 14px;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #d8cbb0;
    letter-spacing: 0.8px;
    text-align: left;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  thead th:last-child { border-right: none; }
  thead th.tc { text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border2);
    transition: background 0.12s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--paper2); }
  tbody tr:hover { background: #ede4d0; }

  td {
    padding: 11px 14px;
    font-size: 13px;
    vertical-align: middle;
    border-right: 1px solid var(--border2);
  }

  td:last-child { border-right: none; }

  /* ── RANK ── */
  .col-rank {
    width: 52px;
    min-width: 52px;
    text-align: center;
  }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    font-size: 11.5px;
    font-weight: 700;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
  }

  .rank-1  { background: #f5e6a8; color: #7a5800; border: 1.5px solid #c8a030; }
  .rank-2  { background: #e8e8e8; color: #505050; border: 1.5px solid #a8a8a8; }
  .rank-3  { background: #f5d8b8; color: #7a3a08; border: 1.5px solid #c07840; }
  .rank-default { background: transparent; color: var(--ink3); border: 1px solid var(--border); font-size: 11px; }

  /* ── CHOICE ── */
  .col-choice {
    min-width: 280px;
    max-width: 400px;
    line-height: 1.65;
    color: var(--ink2);
    font-size: 12.5px;
  }

  .choice-main { display: block; }

  .choice-desc {
    display: block;
    font-size: 11.5px;
    color: var(--ink3);
    line-height: 1.6;
    margin-top: 6px;
    padding: 5px 8px;
    background: var(--paper2);
    border-left: 2.5px solid var(--border);
    border-radius: 0 4px 4px 0;
  }

  /* ── KEYWORD TAG ── */
  .col-kw {
    width: 120px;
    min-width: 100px;
  }

  .kw-tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  /* ── ANSWER TAG & REVEAL BUTTON ── */
  .col-ans {
    width: 140px;
    min-width: 120px;
  }

  .ans-tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11.5px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* 고대국가 정답 색상 */
  .ans-paleolithic { background: #ede0d0; color: #4a2c10; border: 1px solid #c8a880; }
  .ans-neolithic   { background: #d8f0e8; color: #1a5038; border: 1px solid #80c8a8; }
  .ans-bronze      { background: #f8e8c0; color: #6a4a00; border: 1px solid #d8b840; }
  .ans-iron        { background: #e0e8f0; color: #1a2850; border: 1px solid #8098c0; }
  .ans-gojoseon    { background: #f0e0e8; color: #680830; border: 1px solid #d090a8; }
  .ans-buyeo       { background: #e8e0f8; color: #401868; border: 1px solid #b090d8; }
  .ans-okjeo       { background: #d8f0f8; color: #0a4058; border: 1px solid #70b8d8; }
  .ans-dongye      { background: #e8f0d8; color: #284808; border: 1px solid #90b870; }
  .ans-samhan      { background: #f8e8e8; color: #681818; border: 1px solid #d89898; }
  .ans-goguryeo    { background: #e0f0e8; color: #1a5030; border: 1px solid #90c8a8; }
  .ans-other       { background: #eeeeee; color: #404040; border: 1px solid #cccccc; }

  /* ── REVEAL BUTTON ── */
  .ans-wrap {
    display: inline-flex;
    align-items: center;
    gap: 0;
  }

  .ans-hidden {
    display: none;
  }

  .btn-reveal {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 11px;
    border-radius: 5px;
    font-size: 11.5px;
    font-weight: 600;
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: 1.5px dashed var(--border);
    background: var(--paper2);
    color: var(--ink4);
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  .btn-reveal:hover {
    border-color: var(--amber);
    background: #fff8ec;
    color: var(--amber);
  }

  .btn-reveal .eye-icon {
    font-size: 13px;
    line-height: 1;
  }

  /* ── BAR ── */
  .col-bar {
    min-width: 180px;
    width: 210px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .bar-num {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    min-width: 22px;
    text-align: right;
    color: var(--red);
  }

  .bar-track {
    flex: 1;
    height: 9px;
    background: var(--paper2);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .bar-fill {
    height: 100%;
    border-radius: 5px;
  }

  .bt1 { background: linear-gradient(90deg, #9b2828, #c94040); }
  .bt2 { background: linear-gradient(90deg, #b86020, #d89040); }
  .bt3 { background: linear-gradient(90deg, #c0981a, #d8b840); }
  .bt4 { background: linear-gradient(90deg, #2a7a50, #48a870); }
  .bt5 { background: linear-gradient(90deg, #1a6080, #3090b0); }

  /* ── FOOTER ── */
  .footer {
    max-width: 1120px;
    margin: 22px auto 0;
    font-size: 11px;
    color: var(--ink4);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ── MOBILE CARD LIST ── */
  .mobile-list { display: none; }

  .m-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow2);
    margin-bottom: 12px;
  }

  .m-card-stripe { height: 4px; }

  .m-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px 8px;
  }

  .m-card-body {
    padding: 0 14px 14px;
  }

  .m-choice-main {
    display: block;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink2);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .m-choice-desc {
    display: block;
    font-size: 12px;
    color: var(--ink3);
    line-height: 1.65;
    padding: 7px 10px;
    background: var(--paper2);
    border-left: 2.5px solid var(--border);
    border-radius: 0 4px 4px 0;
    margin-bottom: 10px;
  }

  .m-card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .m-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .m-bar-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
  }

  .m-bar-num {
    font-size: 14px;
    font-weight: 700;
    color: var(--red);
    min-width: 18px;
    text-align: right;
  }

  .m-bar-track {
    width: 80px;
    height: 8px;
    background: var(--paper2);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .m-bar-fill { height: 100%; border-radius: 5px; }

  /* 모바일 정답 래퍼 */
  .m-ans-wrap {
    display: inline-flex;
    align-items: center;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    body { padding: 28px 14px 60px; font-size: 13px; }

    h1 { font-size: 22px; }

    .header-inner { flex-direction: column; align-items: flex-start; gap: 12px; }

    .header-right { gap: 8px; }
    .chip { padding: 6px 12px; }
    .chip-num { font-size: 16px; }

    .legend { gap: 8px; margin-top: 12px; }
    .legend-item { font-size: 10.5px; }

    /* 테이블 숨기고 카드 리스트 표시 */
    .card { display: none; }
    .mobile-list { display: block; max-width: 1120px; margin: 0 auto; }
  }
</style>
</head>
<body>

<header class="page-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="eyebrow">
        <div class="eyebrow-dot"></div>
        <span class="eyebrow-text">한국사능력검정시험 대비 — 퀴즈 모드</span>
      </div>
      <h1>고대국가 <em>핵심 키워드</em> 퀴즈</h1>
      <p class="header-sub">정답 열을 가린 상태로 시작합니다 · 버튼을 클릭하면 정답을 확인할 수 있습니다</p>
    </div>
    <div class="header-right">
      <div class="chip"><span class="chip-num">281</span><div class="chip-label">총 기출 선택지</div></div>
      <div class="chip"><span class="chip-num">32</span><div class="chip-label">핵심 키워드</div></div>
      <div class="chip"><span class="chip-num">21</span><div class="chip-label">최고 출제횟수</div></div>
    </div>
  </div>
  <div class="legend">
    <span class="legend-title">정답 구분 →</span>
    <div class="legend-item"><div class="legend-dot" style="background:#4a2c10;border:1px solid #c8a880"></div>구석기</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a5038;border:1px solid #80c8a8"></div>신석기</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6a4a00;border:1px solid #d8b840"></div>청동기</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a2850;border:1px solid #8098c0"></div>철기</div>
    <div class="legend-item"><div class="legend-dot" style="background:#680830;border:1px solid #d090a8"></div>고조선</div>
    <div class="legend-item"><div class="legend-dot" style="background:#401868;border:1px solid #b090d8"></div>부여</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0a4058;border:1px solid #70b8d8"></div>옥저</div>
    <div class="legend-item"><div class="legend-dot" style="background:#284808;border:1px solid #90b870"></div>동예</div>
    <div class="legend-item"><div class="legend-dot" style="background:#681818;border:1px solid #d89898"></div>삼한</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a5030;border:1px solid #90c8a8"></div>고구려</div>
  </div>
</header>

<!-- 전체 공개/숨김 컨트롤 -->
<div class="quiz-controls">
  <button class="btn-reveal-all" onclick="revealAll()">
    <span class="eye-icon">👁</span> 정답 전체 보기
  </button>
  <button class="btn-hide-all" onclick="hideAll()">
    <span>🙈</span> 정답 전체 숨기기
  </button>
  <span class="quiz-hint">개별 버튼 클릭으로 <span>하나씩</span> 확인도 가능합니다</span>
</div>

<div class="card">
  <div class="card-top-stripe"></div>
  <table>
    <thead>
      <tr>
        <th class="tc">순위</th>
        <th>대표 선택지</th>
        <th>핵심 키워드</th>
        <th>정답</th>
        <th>출제횟수</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="mobile-list" id="mobileList"></div>

<footer class="footer">
  <span>출처 : 한국사능력검정시험 기출문제 &nbsp;|&nbsp; 총 281개 선택지 · 핵심 키워드 분석</span>
  <span>빈도 기준 내림차순 정렬 (1위 = 최다 출제)</span>
</footer>

<script>
const MAX = 21;

const rows = [
  { r:1,  cnt:21, kw:"막집",         ans:"구석기",    ansType:"paleolithic",
    c1:"주로 동굴이나 강가의 막집에 거주하였다.",
    desc:"구석기 시대 사람들은 이동 생활을 하며 자연 동굴이나 강가에 막집을 짓고 살았으며, 불을 사용하고 사냥·채집으로 먹이를 구하였다." },
  { r:2,  cnt:20, kw:"고인돌",        ans:"청동기",    ansType:"bronze",
    c1:"많은 인력을 동원하여 고인돌을 축조하였다.",
    desc:"청동기 시대 지배층의 무덤인 고인돌은 거대한 돌을 운반하기 위해 많은 노동력이 필요했으며, 계급 사회의 성립을 보여 준다." },
  { r:3,  cnt:18, kw:"사출도",        ans:"부여",      ansType:"buyeo",
    c1:"여러 가(加)들이 별도로 사출도를 주관하였다.",
    desc:"부여의 마가·우가·저가·구가 등 여러 가(加)들은 각자의 구역인 사출도를 독자적으로 다스렸으며, 왕권이 상대적으로 약하였다." },
  { r:4,  cnt:18, kw:"소도",          ans:"삼한",      ansType:"samhan",
    c1:"신성 구역인 소도가 존재하였다.",
    desc:"삼한의 소도는 제사장인 천군이 관할하는 신성 구역으로, 죄인이 도망쳐도 군장이 잡아갈 수 없는 독특한 풍습이 있었다." },

const kwStyle = {
  paleolithic: "background:#ede0d0;color:#4a2c10;border:1px solid #c8a880",
  neolithic:   "background:#d8f0e8;color:#1a5038;border:1px solid #80c8a8",
  bronze:      "background:#f8e8c0;color:#6a4a00;border:1px solid #d8b840",
  iron:        "background:#e0e8f0;color:#1a2850;border:1px solid #8098c0",
  gojoseon:    "background:#f0e0e8;color:#680830;border:1px solid #d090a8",
  buyeo:       "background:#e8e0f8;color:#401868;border:1px solid #b090d8",
  okjeo:       "background:#d8f0f8;color:#0a4058;border:1px solid #70b8d8",
  dongye:      "background:#e8f0d8;color:#284808;border:1px solid #90b870",
  samhan:      "background:#f8e8e8;color:#681818;border:1px solid #d89898",
  goguryeo:    "background:#e0f0e8;color:#1a5030;border:1px solid #90c8a8",
  other:       "background:#eeeeee;color:#404040;border:1px solid #cccccc",
};

function barTier(cnt) {
  if (cnt >= 16) return 'bt1';
  if (cnt >= 11) return 'bt2';
  if (cnt >= 7)  return 'bt3';
  if (cnt >= 4)  return 'bt4';
  return 'bt5';
}

function rankClass(r) {
  if (r === 1) return 'rank-1';
  if (r === 2) return 'rank-2';
  if (r === 3) return 'rank-3';
  return 'rank-default';
}

// 정답 버튼 토글
function toggleAnswer(btn) {
  const wrap = btn.closest('.ans-wrap, .m-ans-wrap');
  const ansTag = wrap.querySelector('.ans-tag');
  const isHidden = ansTag.classList.contains('ans-hidden');
  if (isHidden) {
    ansTag.classList.remove('ans-hidden');
    btn.innerHTML = '<span class="eye-icon">🙈</span> 숨기기';
  } else {
    ansTag.classList.add('ans-hidden');
    btn.innerHTML = '<span class="eye-icon">👁</span> 정답 보기';
  }
}

// 전체 공개
function revealAll() {
  document.querySelectorAll('.ans-tag').forEach(el => el.classList.remove('ans-hidden'));
  document.querySelectorAll('.btn-reveal').forEach(btn => {
    btn.innerHTML = '<span class="eye-icon">🙈</span> 숨기기';
  });
}

// 전체 숨김
function hideAll() {
  document.querySelectorAll('.ans-tag').forEach(el => el.classList.add('ans-hidden'));
  document.querySelectorAll('.btn-reveal').forEach(btn => {
    btn.innerHTML = '<span class="eye-icon">👁</span> 정답 보기';
  });
}

const tbody = document.getElementById('tbody');
const mobileList = document.getElementById('mobileList');

const stripeColor = {
  bt1: 'linear-gradient(90deg,#9b2828,#c94040)',
  bt2: 'linear-gradient(90deg,#b86020,#d89040)',
  bt3: 'linear-gradient(90deg,#c0981a,#d8b840)',
  bt4: 'linear-gradient(90deg,#2a7a50,#48a870)',
  bt5: 'linear-gradient(90deg,#1a6080,#3090b0)',
};

rows.forEach(d => {
  const pct  = Math.round((d.cnt / MAX) * 100);
  const ks   = kwStyle[d.ansType] || kwStyle.other;
  const tier = barTier(d.cnt);

  /* ── 데스크톱 테이블 행 ── */
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-rank tc"><span class="rank-badge ${rankClass(d.r)}">${d.r}</span></td>
    <td class="col-choice">
      <span class="choice-main">${d.c1}</span>
      ${d.desc ? `<span class="choice-desc">${d.desc}</span>` : ''}
    </td>
    <td class="col-kw"><span class="kw-tag" style="${ks}">${d.kw}</span></td>
    <td class="col-ans">
      <span class="ans-wrap">
        <span class="ans-tag ans-${d.ansType} ans-hidden">${d.ans}</span>
        <button class="btn-reveal" onclick="toggleAnswer(this)"><span class="eye-icon">👁</span> 정답 보기</button>
      </span>
    </td>
    <td class="col-bar">
      <div class="bar-row">
        <span class="bar-num">${d.cnt}</span>
        <div class="bar-track">
          <div class="bar-fill ${tier}" style="width:${pct}%"></div>
        </div>
      </div>
    </td>`;
  tbody.appendChild(tr);

  /* ── 모바일 카드 ── */
  const mc = document.createElement('div');
  mc.className = 'm-card';
  mc.innerHTML = `
    <div class="m-card-stripe" style="background:${stripeColor[tier]}"></div>
    <div class="m-card-head">
      <span class="rank-badge ${rankClass(d.r)}">${d.r}</span>
      <span class="kw-tag" style="${ks}">${d.kw}</span>
      <span class="m-ans-wrap" style="margin-left:auto">
        <span class="ans-tag ans-${d.ansType} ans-hidden">${d.ans}</span>
        <button class="btn-reveal" onclick="toggleAnswer(this)"><span class="eye-icon">👁</span> 정답 보기</button>
      </span>
    </div>
    <div class="m-card-body">
      <span class="m-choice-main">${d.c1}</span>
      ${d.desc ? `<span class="m-choice-desc">${d.desc}</span>` : ''}
      <div class="m-card-foot">
        <div class="m-tags"></div>
        <div class="m-bar-wrap">
          <span class="m-bar-num">${d.cnt}회</span>
          <div class="m-bar-track">
            <div class="m-bar-fill ${tier}" style="width:${pct}%"></div>
          </div>
        </div>
      </div>
    </div>`;
  mobileList.appendChild(mc);
});
